<svg width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500&amp;family=Lexend:wght@500;600&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="400" fill="#F6F1E9"/>

  <!-- Stage 1: Editor -->
  <g>
    <rect x="40" y="60" width="160" height="84" rx="8" fill="#EBE5D9" stroke="#7A2535" stroke-width="0.8"/>
    <text x="120" y="93" text-anchor="middle" dominant-baseline="central"
      font-family="'Lexend', system-ui, sans-serif" font-size="14" font-weight="500" fill="#1E1008">1. Editor</text>
    <text x="120" y="117" text-anchor="middle" dominant-baseline="central"
      font-family="'Instrument Sans', system-ui, sans-serif" font-size="12" font-weight="400" fill="#7A6355">Format on save</text>
    <text x="120" y="133" text-anchor="middle" dominant-baseline="central"
      font-family="'Instrument Sans', system-ui, sans-serif" font-size="12" font-weight="400" fill="#7A6355">VS Code + Ruff extension</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="200" y1="102" x2="256" y2="102" stroke="#7A2535" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

  <!-- Stage 2: Pre-commit -->
  <g>
    <rect x="258" y="60" width="164" height="84" rx="8" fill="#EBE5D9" stroke="#7A2535" stroke-width="0.8"/>
    <text x="340" y="93" text-anchor="middle" dominant-baseline="central"
      font-family="'Lexend', system-ui, sans-serif" font-size="14" font-weight="500" fill="#1E1008">2. Pre-commit hook</text>
    <text x="340" y="117" text-anchor="middle" dominant-baseline="central"
      font-family="'Instrument Sans', system-ui, sans-serif" font-size="12" font-weight="400" fill="#7A6355">Catches issues locally</text>
    <text x="340" y="133" text-anchor="middle" dominant-baseline="central"
      font-family="'Instrument Sans', system-ui, sans-serif" font-size="12" font-weight="400" fill="#7A6355">Before code leaves machine</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="422" y1="102" x2="478" y2="102" stroke="#7A2535" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

  <!-- Stage 3: CI/CD -->
  <g>
    <rect x="480" y="60" width="160" height="84" rx="8" fill="#EBE5D9" stroke="#7A2535" stroke-width="0.8"/>
    <text x="560" y="93" text-anchor="middle" dominant-baseline="central"
      font-family="'Lexend', system-ui, sans-serif" font-size="14" font-weight="500" fill="#1E1008">3. CI/CD</text>
    <text x="560" y="117" text-anchor="middle" dominant-baseline="central"
      font-family="'Instrument Sans', system-ui, sans-serif" font-size="12" font-weight="400" fill="#7A6355">Quality gate on PR</text>
    <text x="560" y="133" text-anchor="middle" dominant-baseline="central"
      font-family="'Instrument Sans', system-ui, sans-serif" font-size="12" font-weight="400" fill="#7A6355">GitHub Actions enforces</text>
  </g>

  <!-- Stage labels -->
  <text x="120" y="175" text-anchor="middle"
    font-family="'Instrument Sans', system-ui, sans-serif" font-size="12" fill="#7A6355">Developer's machine</text>
  <line x1="40" y1="182" x2="200" y2="182" stroke="#7A6355" stroke-width="0.5" stroke-dasharray="4 3"/>

  <text x="340" y="175" text-anchor="middle"
    font-family="'Instrument Sans', system-ui, sans-serif" font-size="12" fill="#7A6355">Local enforcement</text>
  <line x1="258" y1="182" x2="422" y2="182" stroke="#7A6355" stroke-width="0.5" stroke-dasharray="4 3"/>

  <text x="560" y="175" text-anchor="middle"
    font-family="'Instrument Sans', system-ui, sans-serif" font-size="12" fill="#7A6355">Remote enforcement</text>
  <line x1="480" y1="182" x2="640" y2="182" stroke="#7A6355" stroke-width="0.5" stroke-dasharray="4 3"/>

  <!-- Divider -->
  <line x1="40" y1="230" x2="640" y2="230" stroke="#7A6355" stroke-width="0.5" stroke-dasharray="4 3"/>

  <!-- Escape hatch label -->
  <text x="340" y="260" text-anchor="middle"
    font-family="'Instrument Sans', system-ui, sans-serif" font-size="12" fill="#7A6355">Each stage is a fallback if the previous is skipped</text>

  <!-- Fallback arrows -->
  <path d="M120 272 Q230 310 320 272" fill="none" stroke="#7A6355" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="220" y="308" text-anchor="middle"
    font-family="'Instrument Sans', system-ui, sans-serif" font-size="12" fill="#7A6355">skipped setup</text>

  <path d="M340 272 Q450 330 540 272" fill="none" stroke="#7A6355" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="445" y="328" text-anchor="middle"
    font-family="'Instrument Sans', system-ui, sans-serif" font-size="12" fill="#7A6355">bypassed hook</text>

  <!-- Accent bar on boxes -->
  <rect x="40" y="60" width="4" height="84" rx="2" fill="#7A2535"/>
  <rect x="258" y="60" width="4" height="84" rx="2" fill="#7A2535"/>
  <rect x="480" y="60" width="4" height="84" rx="2" fill="#7A2535"/>
</svg>
