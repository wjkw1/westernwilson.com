{{ define "main" }}
<div>
  <h1 class="font-display text-lg uppercase font-semibold mt-0 mb-2">{{ .Title }}</h1>
  <p class="text-muted font-medium mt-0 mb-8">
    See what these tags mean and how I use them
    <a href="/reflections/how-i-use-tags/">on this post</a>.
  </p>

  <ul class="list-none m-0 p-0 mb-3">
    {{ range .Pages }}
    {{ partial "post-list-item.html" . }}
    {{ end }}
  </ul>

  {{ if eq .Kind "term" }}
  <li class="list-none ">
    <a href="/tags/" class="text-accent text-sm hover:text-accent!">All Tags &rarr;</a>
  </li>
  {{ end }}
</div>
{{ end }}
