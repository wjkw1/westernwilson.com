{{ define "main" }}
<div>
  <h1 class="font-display text-2xl font-semibold mt-0 mb-2">{{ .Title }}</h1>
  <p class="text-muted font-medium mt-0 mb-8">
    See what these tags mean and how I use them
    <a href="/reflections/2026-03-17-how-i-use-tags/">on this post</a>.
  </p>

  <ul class="list-none m-0 p-0 mb-3">
    {{ range .Pages }}
    <li style="border-bottom: 1px solid var(--c-border)" class="py-3 flex items-baseline justify-between gap-4 last:border-b-0">
      <a href="{{ .RelPermalink }}" class="text-heading! font-medium no-underline! hover:text-accent!">
        {{ .Title }}
      </a>
      <time datetime="{{ .Date.Format "2006-01-02" }}" class="text-muted text-sm whitespace-nowrap shrink-0">
        {{ .Date.Format "Jan 2006" }}
      </time>
    </li>
    {{ end }}
  </ul>

  <li class="list-none ">
    <a href="/tags/" class="text-accent text-sm no-underline! hover:text-accent!">All Tags &rarr;</a>
  </li>
</div>
{{ end }}
