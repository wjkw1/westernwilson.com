{{ define "main" }}
<div>
  <h1 class="font-display text-lg uppercase font-semibold mt-0 mb-3">{{ .Title }}</h1>
  {{ with .Params.description }}
  <p class="text-muted text-sm mb-8 leading-relaxed">{{ . | markdownify }}</p>
  {{ end }}

  <ul class="list-none m-0 p-0">
    {{ range .Pages }}
    {{ partial "post-list-item.html" . }}
    {{ end }}
  </ul>
</div>
{{ end }}
