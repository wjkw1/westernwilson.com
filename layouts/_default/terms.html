{{ define "main" }}
<div class="space-y-8">
  <h1 class="font-display text-2xl font-semibold mt-0">{{ .Title }}</h1>
  <p class="text-muted font-medium mt-0 mb-6">
    See what these tags mean and how I use them
    <a href="/reflections/2026-03-17-how-i-use-tags/">on this post</a>.
  </p>

  <ul class="list-none m-0 p-0 space-y-2 lowercase">
    {{ range .Data.Terms.Alphabetical }}
    <li>
      <a
        href="{{ .Page.RelPermalink }}"
        class="text-heading! no-underline! hover:text-accent!"
      >
        {{ .Page.Title }}
        <span class="text-muted text-sm">({{ .Count }})</span>
      </a>
    </li>
    <li
      style="border-bottom: 1px solid var(--c-border)"
      class="py-3 flex items-baseline justify-between gap-4 last:border-b-0"
    ></li>
    {{ end }}
  </ul>
</div>
{{ end }}
