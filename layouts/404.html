{{ define "main" }}
<div class="text-center py-20">
  <h1 class="font-display text-6xl font-semibold text-heading mb-4">404</h1>
  <p id="404-message" class="text-muted mb-4">Page not found.</p>
  <p id="404-hint" class="text-muted text-sm mb-8 hidden"></p>
  <a id="404-link" href="{{ .Site.BaseURL }}" class="text-accent text-sm">← Back home</a>
</div>

<script>
  (function () {
    const path = window.location.pathname;
    const message = document.getElementById("404-message");
    const hint = document.getElementById("404-hint");
    const link = document.getElementById("404-link");

    const sections = [
      {
        prefix: "/reflections/",
        label: "reflection",
      }
    ];

    const match = sections.find((s) => path.startsWith(s.prefix));

    if (match) {
      message.textContent = `That ${match.label} doesn't exist.`;
      hint.textContent = "It may have been moved or the link is incorrect.";
      hint.classList.remove("hidden");
    }
  })();
</script>
{{ end }}
