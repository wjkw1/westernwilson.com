<footer class="mt-auto border-t border-base">
  <div class="max-w-2xl mx-auto px-6 py-8 flex flex-col items-center gap-4">
    {{ with .Site.Params.social }}
    <ul class="flex gap-5 list-none m-0 p-0">
      {{ range sort . "weight" }}
      <li>
        <a href="{{ .url }}" rel="{{ .rel }}" aria-label="{{ .name }}" class="text-lg text-muted! no-underline! hover:text-accent!">
          <i class="{{ .icon }}"></i>
        </a>
      </li>
      {{ end }}
    </ul>
    {{ end }}
    <p class="text-sm text-muted m-0">© {{ now.Year }} {{ .Site.Params.author }}</p>
  </div>
</footer>
